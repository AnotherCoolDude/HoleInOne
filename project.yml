name: HoleInOne
options:
  bundleIdPrefix: com.holeinone
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "15"

settings:
  SWIFT_VERSION: "5.9"
  MARKETING_VERSION: "1.0.0"
  CURRENT_PROJECT_VERSION: "1"

targets:

  # ─── iOS App ────────────────────────────────────────────────────────────────

  HoleInOne:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HoleInOne
      - path: Shared
    resources:
      - HoleInOne/Resources
    info:
      path: HoleInOne/Info.plist
      properties:
        CFBundleDisplayName: HoleInOne
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSLocationWhenInUseUsageDescription: "HoleInOne needs your location to calculate the distance to the pin."
        # Set to YES when CloudKit entitlements are active (paid Developer account).
        # CloudGPSService reads this before touching any CKContainer API.
        HIOCloudKitEnabled: "NO"
        UILaunchScreen: {}
        # Populate GOLF_API_KEY via Secrets.xcconfig (gitignored)
        GOLF_API_KEY: "$(GOLF_API_KEY)"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.holeinone.app
      INFOPLIST_FILE: HoleInOne/Info.plist
    dependencies:
      - target: "HoleInOne Watch App"
        embed: true

  # ─── watchOS App ────────────────────────────────────────────────────────────

  "HoleInOne Watch App":
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: "HoleInOne Watch App"
      - path: Shared
    info:
      path: "HoleInOne Watch App/Info.plist"
      properties:
        CFBundleDisplayName: HoleInOne
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.holeinone.app
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.holeinone.app.watchkitapp
      INFOPLIST_FILE: "HoleInOne Watch App/Info.plist"
